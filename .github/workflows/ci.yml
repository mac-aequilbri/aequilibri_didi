# CI gate — typecheck, tests (against a throwaway SQLite db) and a production
# build on every push/PR. To make Render wait for this before deploying, set
# the service's Auto-Deploy to "After CI Checks Pass" in the Render dashboard.

name: ci

on:
  push:
    branches: [master]
  pull_request: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DEV_DATABASE_URL: "file:./ci.db"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:dev:gen
      - run: npx prisma db push --schema prisma/schema.dev.prisma
      - run: npm run typecheck
      - run: npm run lint
      - run: npx vitest run
      - run: npm run build
