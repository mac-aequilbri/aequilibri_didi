services:
  - type: web
    name: aequilibri-next
    runtime: node
    region: singapore       # change to your preferred region
    plan: free              # free tier (no card needed); upgrade to starter/standard for always-on production
    # NOTE on the build command:
    #   --include=dev  → NODE_ENV=production (set below) makes npm skip
    #                    devDependencies, but the build toolchain (prisma CLI,
    #                    typescript, tailwind) lives there. Without this the
    #                    build fails with "prisma: not found" / missing types.
    #   migrate-deploy.mjs → tracked migrations via `prisma migrate deploy`,
    #                    self-healing for the db-push-era transition states
    #                    (unbaselined DB, objects that already exist, recorded
    #                    failed migrations). Unknown failures still fail the
    #                    build. db push is no longer used in production.
    #   seed.mjs       → DEMO data; only runs when SEED_DEMO_DATA=true (below).
    #                    Remove that env var the moment real customer data
    #                    lives in this database.
    buildCommand: npm ci --include=dev && npx prisma generate && node scripts/migrate-deploy.mjs && node prisma/seed.mjs && npm run build
    startCommand: npm start
    healthCheckPath: /

    envVars:
      # ── Database (auto-wired from the managed Postgres below) ──────────────
      - key: DATABASE_URL
        fromDatabase:
          name: aequilibri-next-db
          property: connectionString

      # ── AI (required for live responses; omit for demo mode) ───────────────
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── Airtable migration (system of record) ─────────────────────────────
      # When AIRTABLE_MIGRATION=true the migrated functionalities read/write the
      # org's Airtable base instead of Postgres. AIRTABLE_PAT is a secret and
      # MUST be set manually in the Render dashboard (sync: false below) — it must
      # be a token that can reach the new workspace + all three template bases.
      # AIRTABLE_BASES is a legacy orgSlug -> baseId override; real customers get
      # their base id stored at onboarding (PlatOrganisation.airtableBaseId), so
      # the map is normally empty. In production an org with no resolvable base
      # throws (no demo-base fallback).
      - key: AIRTABLE_MIGRATION
        value: "true"
      - key: AIRTABLE_BASES
        value: "{}"
      - key: AIRTABLE_PAT
        sync: false
      # Spec 12 onboarding: a human duplicates the vertical template base natively
      # in Airtable (preserves computed/rollup fields), pastes the new base id in
      # /app/new, and the app ensures its runtime tables + registers the org. No
      # API base-cloning on the onboarding path, so AIRTABLE_WORKSPACE_ID is only
      # used by the deprecated provisionClientBase ops fallback.
      # AIRTABLE_TEMPLATE_BASE_ID is the base schema-drift compares against.
      - key: AIRTABLE_WORKSPACE_ID
        value: "wsp0SwxU3j8IwLZJ1"
      - key: AIRTABLE_TEMPLATE_BASE_ID
        value: "appXfwBLE6zBEL5Zr"

      # ── Auth (Clerk) ────────────────────────────────────────────────────────
      # The platform FAILS CLOSED without these: /app/* returns 503 unless
      # ALLOW_DEMO_MODE=true is set explicitly. Remove ALLOW_DEMO_MODE when
      # Clerk keys are configured.
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: ALLOW_DEMO_MODE
        value: "true"
      # Platform operators allowed to provision new orgs once auth is on
      # (comma-separated emails).
      - key: PLATFORM_ADMIN_EMAILS
        sync: false
      # Demo seed opt-in — remove once real customer data exists.
      - key: SEED_DEMO_DATA
        value: "true"

      # ── Automation (scheduler endpoint token; omit to disable) ─────────────
      - key: CRON_SECRET
        sync: false
      # Inbound integration webhook (/api/platform/hooks) fallback signing
      # secret for single-tenant/demo. Per-org secrets live in the control-base
      # registry Settings JSON and take precedence; omit both to disable hooks.
      - key: PLATFORM_WEBHOOK_SECRET
        sync: false

      # ── Module 2 inbox ingestion (live IMAP mailbox; omit all to use demo
      #    fixtures). The /api/platform/ingest-inbox endpoint reuses CRON_SECRET.
      - key: IMAP_HOST
        sync: false
      - key: IMAP_PORT
        sync: false
      - key: IMAP_USER
        sync: false
      - key: IMAP_PASSWORD
        sync: false
      - key: IMAP_MAILBOX
        sync: false
      - key: IMAP_TLS
        sync: false

      # ── Google Drive document storage (omit all three for local storage) ───
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false

      # ── Xero read integration (Custom Connection; omit for demo ledger) ────
      - key: XERO_CLIENT_ID
        sync: false
      - key: XERO_CLIENT_SECRET
        sync: false

      # ── Google APIs (UC1 only — omit if only deploying UC2/UC3) ───────────
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_SOLAR_API_KEY
        sync: false

      # ── Geoscape (UC1 only) ────────────────────────────────────────────────
      - key: GEOSCAPE_CONSUMER_KEY
        sync: false

      # ── Runtime ────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

# Managed PostgreSQL — provisioned together with the web service when you
# create the Blueprint. (Renamed from the Django blueprint's `aequilibri-db`
# so the two don't collide if both briefly exist.)
databases:
  - name: aequilibri-next-db
    plan: free              # free Postgres expires after ~30 days — upgrade for production
    region: singapore
